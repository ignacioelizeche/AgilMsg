events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml text/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=100r/s;

    server {
        listen 80;
        server_name _;

        # ─── Webhook (check FIRST — no auth, specific path) ──
        location /agilmsg/webhook/ {
            limit_req zone=webhook burst=50 nodelay;

            rewrite ^/agilmsg/(.*)$ /$1 break;

            proxy_pass http://api:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /agilmsg;
        }

        # ─── API routes (check before frontend) ─────────────
        location /agilmsg/api/ {
            limit_req zone=api burst=20 nodelay;

            rewrite ^/agilmsg/(.*)$ /$1 break;

            proxy_pass http://api:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /agilmsg;
        }

        # ─── Frontend (Next.js) ────────────────────────────
        location /agilmsg/ {
            proxy_pass http://web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Redirect root to /agilmsg/ ──────────────────────
        location = / {
            return 301 /agilmsg/;
        }

        # ─── Catch-all ──────────────────────────────────────
        location / {
            return 404;
        }
    }
}
